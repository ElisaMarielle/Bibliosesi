<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsivos.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="container">
            <h1>Cadastro Bibliosesi</h1>
            <div class="cadastro">
                <form action="" method="">
                    <!--Nome do aluno----------------------->
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome.">
                    
                    <!--Email do aluno----------------------->
                    <div class="mail">
                        <label for="email">E-mail Educacional:</label>
                        <div class="inp">
                            <input type="email" id="email" placeholder="xxxxxxxxxxx">
                            <span id="pl">@portalsesisp.org.br</span>
                        </div>
                    </div>

                    <!--Senha----------------------->
                    <label for="senha">Senha:</label>
                    <input id="senha" type="password" placeholder="Digite sua senha.">

                    <!--RM----------------------->
                    <label for="rm">RM:</label>
                    <input id="rm" type="text" placeholder="Registro do aluno.">
                </form>

                <div class="botao">
                    <a href="login.htm">
                        <button id="bt-cadastrar">Cadastrar</button>
                    </a>
                </div>
                <p>Já é cadastrado? Faça <a href="login.htm" style="color: #912727;">login</a></p>
            </div>
        </div>
    </main>
</body>
</html>
